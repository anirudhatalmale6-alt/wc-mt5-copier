<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      color: #60a5fa;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .status.connected { background: #064e3b; color: #6ee7b7; }
    .status.disconnected { background: #450a0a; color: #fca5a5; }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot.green { background: #22c55e; }
    .dot.red { background: #ef4444; }
    .section {
      background: #1e293b;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .section h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 12px;
    }
    .stat-label { color: #94a3b8; }
    .stat-value { color: #f1f5f9; font-weight: 500; }
    .log {
      max-height: 120px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #94a3b8;
      line-height: 1.5;
    }
    .log .entry { padding: 2px 0; border-bottom: 1px solid #1e293b; }
    .log .buy { color: #22c55e; }
    .log .sell { color: #ef4444; }
    .log .close { color: #f59e0b; }
    a {
      color: #60a5fa;
      text-decoration: none;
      font-size: 12px;
      display: block;
      text-align: center;
      margin-top: 8px;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>WC → MT5 Copier</h1>
  <div id="status" class="status disconnected">
    <span class="dot red" id="statusDot"></span>
    <span id="statusText">Checking middleware...</span>
  </div>

  <div class="section">
    <h2>Statistics</h2>
    <div class="stat-row">
      <span class="stat-label">Signals sent</span>
      <span class="stat-value" id="signalCount">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Orders copied</span>
      <span class="stat-value" id="orderCount">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Last signal</span>
      <span class="stat-value" id="lastSignal">—</span>
    </div>
  </div>

  <div class="section">
    <h2>Recent Activity</h2>
    <div class="log" id="log">
      <div class="entry" style="color:#64748b;">Waiting for signals...</div>
    </div>
  </div>

  <a href="http://127.0.0.1:5000" target="_blank">Open Dashboard →</a>

  <script src="popup.js"></script>
</body>
</html>
